<html lang="en">
<head>
  <meta charset="UTF-8" />

  <style>
    :root {
      --bg: #faf8f3;
      --card: #fffdf8;
      --ink: #171717;
      --muted: #746f67;
      --line: #e7dfd2;
      --accent: #b43a3a;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, "Helvetica Neue", Helvetica, Arial, "Hiragino Sans",
        "Hiragino Kaku Gothic ProN", "Yu Gothic", "Noto Sans JP", sans-serif;
    }

    body {
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: max(12px, env(safe-area-inset-top)) max(12px, env(safe-area-inset-right))
        max(12px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));
    }

    main {
      width: min(430px, 100%);
      height: min(100svh - 24px, 760px);
      min-height: 600px;
      background: var(--card);
      border: 1px solid var(--line);
      padding:16px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
    }

    .top {
      border-bottom: 1px solid var(--line);
      padding-bottom:8px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
    }

    .label {
      color: var(--muted);
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    h1 {
      margin: 0;
      font-size:0;
      font-weight: 500;
      letter-spacing: -0.065em;
      line-height: 0.95;
    }

    .date {
      color: var(--muted);
      font-size: 0.72rem;
      line-height: 1.35;
      text-align: right;
      max-width: 125px;
      padding-top: 2px;
    }

    .center {
      display: grid;
      place-items: center;
      text-align: center;
      min-height: 0;
      padding: 12px 0;
    }

    .days {
      font-size: clamp(5.2rem, 31vw, 8.6rem);
      font-weight: 730;
      letter-spacing: -0.11em;
      line-height: 0.82;
    }

    .days-label {
      margin-top: 12px;
      color: var(--muted);
      font-size: 0.68rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    .phrase {
      margin-top:16px;
      font-size: clamp(1.25rem, 6vw, 1.95rem);
      font-weight: 430;
      letter-spacing: -0.045em;
      line-height: 1.18;
    }

    .romaji {
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.25;
    }

    .meaning {
      margin: 6px auto 0;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.3;
      max-width: 310px;
    }

    .bottom {
      border-top: 1px solid var(--line);
      padding-top:8px;
      display: grid;
      grid-template-columns: 96px 1fr;
      gap: 14px;
      align-items: center;
    }

    .kanji {
      color: var(--accent);
      font-size: clamp(4.1rem, 21vw, 6.1rem);
      font-weight: 300;
      line-height: 0.9;
      text-align: center;
    }

    .kanji-info {
      color: var(--muted);
      font-size: 0.78rem;
      line-height: 1.45;
      min-width: 0;
    }

    .kanji-title {
      color: var(--ink);
      font-size: 0.9rem;
      font-weight: 650;
      margin-bottom: 2px;
    }

    .print {
      display: none;
    }

    @media (min-width: 700px) {
      main {
        width: min(620px, 100%);
        height: min(88svh, 800px);
        padding: 42px;
      }

      .date { max-width: 190px; font-size: 0.9rem; }
      .label { font-size: 0.78rem; }
      .bottom { grid-template-columns: 140px 1fr; }
      .kanji-info { font-size: 0.96rem; }
      .kanji-title { font-size: 1.1rem; }
      .print {
        display: inline-block;
        margin-top: 14px;
        border: 1px solid var(--line);
        background: transparent;
        padding: 9px 13px;
        border-radius: 999px;
        color: var(--muted);
        cursor: pointer;
        font: inherit;
        font-size: 0.9rem;
      }
    }

    @media (max-height: 680px) {
      main {
        height: calc(100svh - 18px);
        min-height: 0;
        padding: 16px;
      }
      .top { padding-bottom: 10px; }
      h1 { font-size: 1.55rem; }
      .date { font-size: 0.66rem; }
      .days { font-size: clamp(4.7rem, 29vw, 7.2rem); }
      .phrase { margin-top: 18px; font-size: 1.22rem; }
      .romaji, .meaning { font-size: 0.76rem; }
      .bottom {
        padding-top: 10px;
        grid-template-columns: 80px 1fr;
      }
      .kanji { font-size: 4rem; }
      .kanji-info { font-size: 0.72rem; line-height: 1.35; }
    }
  </style>
</head>
