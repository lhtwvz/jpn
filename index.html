        "Yu Gothic",
        "Noto Sans JP",

      display: flex;
      align-items: center;
      justify-content: center;
      padding: 22px;
    }

    main {
      width: min(720px, 100%);
      min-height: 86vh;
      background: var(--card);
      border: 1px solid var(--line);
      padding: clamp(28px, 5vw, 56px);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .top {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 20px;
    }

    .label {
      color: var(--muted);
      font-size: 0.78rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0;
      font-weight: 500;
      font-size: clamp(2.1rem, 6vw, 4.5rem);
      letter-spacing: -0.07em;
      line-height: 0.92;
    }

    .date {
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.5;
      text-align: right;
      max-width: 210px;
    }

    .center {
      text-align: center;
      padding: 46px 0;
    }

    .days {
      font-size: clamp(5.8rem, 24vw, 13rem);
      font-weight: 700;
      letter-spacing: -0.1em;
      line-height: 0.82;
    }

    .days-label {
      margin-top: 18px;
      color: var(--muted);
      font-size: 0.82rem;
      letter-spacing: 0.24em;
      text-transform: uppercase;
    }

    .phrase {
      margin-top: 42px;
      font-size: clamp(1.55rem, 4.8vw, 3rem);
      font-weight: 400;
      letter-spacing: -0.04em;
      line-height: 1.25;
    }

    .romaji {
      margin-top: 12px;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .meaning {
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .bottom {
      border-top: 1px solid var(--line);
      padding-top: 24px;
      display: grid;
      grid-template-columns: 150px 1fr;
      gap: 28px;
      align-items: center;
    }

    .kanji {
      color: var(--accent);
      font-size: clamp(5rem, 17vw, 8.6rem);
      font-weight: 300;
      line-height: 0.9;
      text-align: center;
    }

    .kanji-info {
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.65;
    }

    .kanji-title {
      color: var(--ink);
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 4px;
    }

    button {
      margin-top: 18px;
      border: 1px solid var(--line);
      background: transparent;
      padding: 10px 14px;
      border-radius: 999px;
      color: var(--muted);
      cursor: pointer;
      font: inherit;
      font-size: 0.92rem;
    }

    button:hover {
      color: var(--ink);
      border-color: var(--ink);
    }

    @media (max-width: 620px) {
      main {
        min-height: 92vh;
      }

      .top {
        display: block;
      }

      .date {
        text-align: left;
        margin-top: 18px;
      }

      .bottom {
        grid-template-columns: 1fr;
        text-align: center;
      }
    }
  </style>
</head>

    const msPerDay = 1000 * 60 * 60 * 24;
    const calculatedDaysLeft = Math.ceil((targetStart - todayStart) / msPerDay);

    }
